<!DOCTYPE html>
<html>

<head>
  <title>Utility Hub</title>

  <style>
    body {
      background: #121212;
      font-family: Arial;
      color: white;
      margin: 0;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .section {
      background: #1f1f1f;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 24px;
      margin-bottom: 15px;
      text-align: right;
      border: none;
      border-radius: 10px;
      background: #2d2d2d;
      color: white;
      padding-right: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 10px;
    }

    button {
      height: 55px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    .equal {
      background: orange;
    }

    input[type="date"] {
      width: 100%;
      height: 50px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      padding-left: 10px;
      margin-bottom: 15px;
    }

    .result {
      text-align: center;
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Utility Hub</h1>

<div class="section">

  <h2>Scientific Calculator</h2>

  <input type="text" id="display" readonly>

  <div class="buttons">

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('/')">÷</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('*')">×</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('-')">−</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()" class="equal">=</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('Math.sin(')">sin</button>
    <button onclick="append('Math.cos(')">cos</button>
    <button onclick="append('Math.tan(')">tan</button>
    <button onclick="append('Math.sqrt(')">√</button>

    <button onclick="clearDisplay()">C</button>

  </div>

</div>

<div class="section">

  <h2>What Day Were You Born?</h2>

  <input type="date" id="birthdate">

  <button onclick="findDay()">Find My Birth Day</button>

  <div class="result" id="dayResult"></div>

</div>

<script>

function append(value){
  document.getElementById("display").value += value;
}

function clearDisplay(){
  document.getElementById("display").value = "";
}

function calculate(){
  try{
    document.getElementById("display").value =
    eval(document.getElementById("display").value);
  }

  catch{
    alert("Invalid Expression");
  }
}

function findDay(){

  let birthdate =
  document.getElementById("birthdate").value;

  let date = new Date(birthdate);

  let days = [
    "Sunday",
    "Monday",
    "Tuesday",
    "Wednesday",
    "Thursday",
    "Friday",
    "Saturday"
  ];

  let dayName = days[date.getDay()];

  document.getElementById("dayResult").innerHTML =
  "You were born on a <b>" + dayName + "</b>";
}

</script>

</body>
</html>
